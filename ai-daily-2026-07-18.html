<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI HOT 每日晨报</title>
<style>
  :root{
    --bg:#eef2f9; --bg2:#f7f9fc; --panel:#ffffff; --panel2:#f8fafc;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --line2:#eef2f7;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
    --shadow-hi:0 6px 18px rgba(15,23,42,.10),0 18px 48px rgba(15,23,42,.12);
    --brand:#6366f1; --brand2:#0ea5e9;
    --radius:18px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b1020; --bg2:#0e1426; --panel:#141b30; --panel2:#101728;
      --ink:#e6ecf7; --muted:#94a3b8; --line:#243049; --line2:#1c2438;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
      --shadow-hi:0 8px 24px rgba(0,0,0,.45),0 20px 50px rgba(0,0,0,.5);
      --brand:#818cf8; --brand2:#38bdf8;
    }
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--ink); font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:0 20px 64px}

  /* Hero */
  .hero{
    position:relative; overflow:hidden; margin:22px 0 14px; padding:34px 32px 30px;
    border-radius:26px; color:#fff;
    background:
      radial-gradient(1100px 320px at 12% -20%, rgba(99,102,241,.55), transparent 60%),
      radial-gradient(900px 320px at 95% 0%, rgba(14,165,233,.45), transparent 55%),
      linear-gradient(135deg,#4f46e5 0%,#0ea5e9 60%,#22d3ee 100%);
    box-shadow:var(--shadow-hi);
  }
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 200px at 80% 120%,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .brand{font-weight:700;letter-spacing:.5px;font-size:14px;opacity:.95;
    display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid rgba(255,255,255,.35);border-radius:999px;background:rgba(255,255,255,.10)}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.25)}
  .hero-date{font-size:14px;opacity:.95;font-weight:600}
  .hero-title{margin:18px 0 6px;font-size:clamp(30px,5vw,46px);font-weight:800;letter-spacing:1px;line-height:1.1}
  .hero-sub{margin:0;font-size:15px;opacity:.95}
  .hero-sub strong{font-size:20px}
  .hero-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:22px}
  .stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:12px 10px;text-align:center;backdrop-filter:blur(6px)}
  .stat-ico{font-size:20px;display:block;line-height:1}
  .stat-num{display:block;font-size:26px;font-weight:800;margin:4px 0 2px}
  .stat-lbl{display:block;font-size:11.5px;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hero-note{margin-top:18px;font-size:12.5px;opacity:.85;display:flex;gap:14px;flex-wrap:wrap}
  .hero-note .pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:3px 10px}
  .hero-note .warn{background:rgba(251,191,36,.22);border-color:rgba(251,191,36,.5);color:#fff}

  /* Nav */
  .nav{position:sticky;top:0;z-index:20;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    margin:14px 0 22px;padding:10px;background:color-mix(in srgb,var(--panel) 86%,transparent);
    border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
  .nav a{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:11px;
    color:var(--ink);text-decoration:none;font-size:13.5px;font-weight:600;border:1px solid transparent;transition:.18s}
  .nav a:hover{background:var(--panel2);border-color:var(--line)}
  .nav a b{font-variant-numeric:tabular-nums;background:var(--line2);border-radius:7px;padding:1px 7px;font-size:12px;color:var(--muted)}
  .nav .nav-all{margin-left:auto;color:var(--brand)}
  @media(max-width:640px){.nav .nav-all{margin-left:0}}

  /* Sections */
  .sec{margin:30px 0}
  .sec-head{display:flex;align-items:center;gap:12px;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .sec-ico{width:38px;height:38px;flex:0 0 38px;display:grid;place-items:center;border-radius:11px;font-size:19px;
    background:color-mix(in srgb,var(--c) 16%,transparent);border:1px solid color-mix(in srgb,var(--c) 30%,transparent)}
  .sec-head h2{margin:0;font-size:21px;font-weight:800;letter-spacing:.3px}
  .sec-count{margin-left:auto;font-size:13px;font-weight:700;color:var(--c);background:color-mix(in srgb,var(--c) 12%,transparent);
    border:1px solid color-mix(in srgb,var(--c) 28%,transparent);border-radius:999px;padding:3px 12px;font-variant-numeric:tabular-nums}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 20px 16px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s,border-color .18s;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);opacity:.85}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hi);border-color:color-mix(in srgb,var(--c) 45%,var(--line))}
  .card-num{position:absolute;top:14px;right:16px;font-size:13px;font-weight:800;color:var(--c);
    background:color-mix(in srgb,var(--c) 12%,transparent);border:1px solid color-mix(in srgb,var(--c) 26%,transparent);
    border-radius:9px;min-width:30px;height:30px;display:grid;place-items:center;font-variant-numeric:tabular-nums}
  .card-title{margin:0 38px 8px 0;font-size:16.5px;line-height:1.4;font-weight:700}
  .card-title a{color:var(--ink);text-decoration:none}
  .card-title a:hover{color:var(--c);text-decoration:underline;text-underline-offset:3px}
  .card-sum{margin:0 0 14px;font-size:13.5px;color:var(--muted);line-height:1.65}
  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:12px;border-top:1px solid var(--line2)}
  .src{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .src .badge{background:var(--line2);border-radius:6px;padding:1px 7px;font-weight:600;color:var(--ink)}
  .lnk{font-size:12.5px;font-weight:700;color:var(--c);text-decoration:none;white-space:nowrap;
    display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:9px;border:1px solid color-mix(in srgb,var(--c) 30%,transparent);background:color-mix(in srgb,var(--c) 8%,transparent)}
  .lnk:hover{background:color-mix(in srgb,var(--c) 16%,transparent)}

  .empty{background:var(--panel2);border:1px dashed var(--line);border-radius:14px;padding:22px;text-align:center;color:var(--muted);font-size:13.5px}

  /* Footer */
  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:12.5px}
  .refresh{display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-weight:700;font-size:13px;padding:9px 15px;border-radius:11px;box-shadow:var(--shadow);transition:.18s}
  .refresh:hover{transform:translateY(-2px);box-shadow:var(--shadow-hi);border-color:var(--brand)}
  .refresh:disabled{opacity:.6;cursor:progress;transform:none}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;
    box-shadow:var(--shadow-hi);transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  noscript{display:block;padding:20px;background:var(--panel);border:1px solid var(--line);border-radius:14px;color:var(--muted)}
  @media(max-width:680px){
    .hero-stats{grid-template-columns:repeat(2,1fr)}
    .hero{padding:26px 20px}
    .wrap{padding:0 14px 48px}
  }
</style>
</head>

e":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrp7cwpv0ay9bitoudhrgt7k"}},{"title":"首届“小有可为”大赛乡村教育一等奖作品“智绘科普”技术拆解","summary":"首届“小有可为”大赛乡村教育赛道一等奖作品“智绘科普”采用 Qwen3.5-397B-A17B 大语言模型与 Manim 动画引擎，通过多Agent分阶段协作与自动修复机制，将知识主题转化为可控、可编辑的教学动画。系统包含规划、草稿、实现、审查、合成五个阶段，渲染失败时可自动提取日志并修复，该工程范式可迁移至其他赛道。","sourceUrl":"https://mp.weixin.qq.com/s/a2YKWmyMoyIc3GKLbXffpQ","sourceName":"公众号：通义实验室（千问）","permalink":"https://aihot.virxact.com/items/cmrorbywu06cebitoixzgpb5l","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrorbywu06cebitoixzgpb5l"}},{"title":"LLM cliché highlighter：一款识别AI写作套话的检测工具","summary":"Simon Willison 用 Fable 5 开发了一款 LLM cliché highlighter 应用，用于高亮 LLM 生成文本中常见的十种套话模式，例如“no fluff, no filler, no jargon”这类陈词滥调。该工具旨在帮助读者快速识别并过滤掉充斥在文章中的 AI 写作风格化表达。","sourceUrl":"https://simonwillison.net/2026/Jul/17/llm-cliche-highlighter","sourceName":"Simon Willison 博客","permalink":"https://aihot.virxact.com/items/cmrpy1nvp06pubisrn8ne51v6","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrpy1nvp06pubisrn8ne51v6"}},{"title":"生成式人工智能是一场工程灾难：AI公司抢购70%高端内存，推高电脑价格","summary":"AI公司为维持大语言模型（如ChatGPT、Claude）运行，可能已购买全球70%的高端计算机内存，导致内存与存储价格飙升：两年前350美元的硬盘现已涨至800美元且缺货，部分笔记本电脑涨价50%。科技公司计划未来几年将美国数据中心容量扩大8倍，部分站点甚至用喷气发动机供电。预测称，平价入门级电脑可能在2028年前消失，内存短缺预计持续数年。","sourceUrl":"https://www.theatlantic.com/technology/2026/07/generative-ai-engineering-disaster/687901","sourceName":"Hacker News 热门（buzzing.cc 中文翻译）","permalink":"https://aihot.virxact.com/items/cmro8l78w00j5bitou01qowy4","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmro8l78w00j5bitou01qowy4"}},{"title":"OpenAI 提出 AI 时代记分卡：“有用智能每美元”衡量实际工作价值","summary":"OpenAI 提出“Useful Intelligence per Dollar”（有用智能每美元）作为衡量 AI 投资回报的核心指标，从完成的有用工作量、成功任务的实际成本、结果可靠性三个维度评估。","sourceUrl":"https://openai.com/index/a-scorecard-for-the-ai-age","sourceName":"OpenAI：官网动态（RSS · 排除企业/客户案例）","permalink":"https://aihot.virxact.com/items/cmrozfoiv08mhbitofbllzxl4","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrozfoiv08mhbitofbllzxl4"}},{"title":"AI 时代“小需求”的成本逻辑变了：GitHub 博客谈工程决策新范式","summary":"工程师对小型功能请求的决策成本已超过代码实现成本。AI 智能体可在会议预热时间内生成首个补丁，将抽象的“是否在范围内”争论转化为可审查的具体产物。关键区分在于：代码生成便宜不等于维护便宜，只有人类能自信审查并承担长期责任的变更才算低成本。","sourceUrl":"https://github.blog/engineering/the-cost-of-saying-yes-has-changed","sourceName":"GitHub Blog","permalink":"https://aihot.virxact.com/items/cmrp7vlhg0b51bito6tthz37e","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrp7vlhg0b51bito6tthz37e"}}]}],"flashes":[]},"isToday":false,"usedDate":"2026-07-18","fallback":false,"fetchedAt":"2026-07-19T01:59:23.133Z"}</script>
  <script>
  (function(){
    "use strict";
    var CANON=[
      {key:"ai-models",  label:"模型发布/更新", icon:"🚀", color:"#6366f1"},
      {key:"ai-products",label:"产品发布/更新", icon:"🧰", color:"#0ea5e9"},
      {key:"industry",   label:"行业动态",     icon:"🌐", color:"#10b981"},
      {key:"paper",      label:"论文研究",     icon:"📄", color:"#f59e0b"},
      {key:"tip",        label:"技巧与观点",   icon:"💡", color:"#ec4899"}
    ];
    var LABEL2KEY={"模型发布/更新":"ai-models","产品发布/更新":"ai-products","行业动态":"industry","论文研究":"paper","技巧与观点":"tip"};
    var WEEK=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

    function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
    function fmtDate(str){if(!str)return"";var p=String(str).split("-");if(p.length<3)return str;return (+p[0])+"年"+(+p[1])+"月"+(+p[2])+"日";}
    function weekday(str){var p=String(str).split("-").map(Number);if(p.length<3)return"";return WEEK[new Date(p[0],p[1]-1,p[2]).getDay()];}

    function normalize(env){
      var d=env.source||{};
      var byLabel={};(d.sections||[]).forEach(function(s){if(s&&s.label)byLabel[s.label]=s;});
      var secs=CANON.map(function(c){
        var s=byLabel[c.label];
        var items=(s&&Array.isArray(s.items))?s.items:[];
        return {key:c.key,label:c.label,icon:c.icon,color:c.color,items:items.slice()};
      });
      (d.sections||[]).forEach(function(s){if(s&&s.label&&!LABEL2KEY[s.label]){secs.push({key:"extra-"+secs.length,label:s.label,icon:"📰",color:"#64748b",items:(s.items||[]).slice()});}});
      var n=0;secs.forEach(function(sec){sec.items.forEach(function(it){it._n=++n;});});
      return {secs:secs,total:n,raw:d,env:env};
    }

    function renderHero(m){
      var d=m.raw, env=m.env;
      var dateStr=env.usedDate||d.date||"";
      var stats=m.secs.map(function(s){
        return '<div class="stat" style="--c:'+s.color+'">'
          +'<span class="stat-ico">'+s.icon+'</span>'
          +'<span class="stat-num">'+s.items.length+'</span>'
          +'<span class="stat-lbl">'+esc(s.label)+'</span></div>';
      }).join("");
      var note='<span class="pill">数据日期：'+esc(dateStr)+(weekday(dateStr)?' '+weekday(dateStr):'')+'</span>';
      if(d.windowStart&&d.windowEnd){note+='<span class="pill">窗口：'+esc(d.windowStart.slice(0,10))+' → '+esc(d.windowEnd.slice(0,10))+'</span>';}
      if(d.generatedAt){note+='<span class="pill">生成于 '+esc(d.generatedAt.replace('T',' ').slice(0,16))+' UTC</span>';}
      if(env.fallback){note+='<span class="warn">⚠ 当日日报尚未生成，已回退至最近一期（'+esc(dateStr)+'）</span>';}
      return '<div class="hero-top">'
        +'<span class="brand"><span class="dot"></span>AI HOT · 每日晨报</span>'
        +'<span class="hero-date">'+fmtDate(dateStr)+(weekday(dateStr)?' '+weekday(dateStr):'')+'</span></div>'
        +'<h1 class="hero-title">AI 日报</h1>'
        +'<p class="hero-sub">今日共 <strong>'+m.total+'</strong> 条 · 覆盖 模型 / 产品 / 行业 / 论文 / 观点 五大版块</p>'
        +'<div class="hero-stats">'+stats+'</div>'
        +'<div class="hero-note">'+note+'</div>';
    }

    function renderNav(m){
      var links=m.secs.map(function(s){
        return '<a href="#sec-'+s.key+'">'+s.icon+' '+esc(s.label)+' <b>'+s.items.length+'</b></a>';
      }).join("");
      return links+'<a href="#hero" class="nav-all">全部 <b>'+m.total+'</b></a>';
    }

    function renderContent(m){
      return m.secs.map(function(s){
        var body;
        if(s.items.length===0){
          body='<div class="empty">今日暂未收录「'+esc(s.label)+'」版块内容</div>';
        }else{
          body='<div class="grid">'+s.items.map(function(it){
            var title=esc(it.title||"(无标题)");
            var permalink=esc(it.permalink||it.sourceUrl||"#");
            var srcUrl=esc(it.sourceUrl||it.permalink||"#");
            var srcName=esc(it.sourceName||"AI HOT");
            return '<article class="card" style="--c:'+s.color+'">'
              +'<div class="card-num">'+it._n+'</div>'
              +'<h3 class="card-title"><a href="'+permalink+'" target="_blank" rel="noopener">'+title+'</a></h3>'
              +'<p class="card-sum">'+esc(it.summary||"")+'</p>'
              +'<div class="card-foot"><span class="src"><span class="badge">'+srcName+'</span></span>'
              +'<a class="lnk" href="'+srcUrl+'" target="_blank" rel="noopener">查看原文 ↗</a></div>'
              +'</article>';
          }).join("")+'</div>';
        }
        return '<section class="sec" id="sec-'+s.key+'">'
          +'<div class="sec-head" style="--c:'+s.color+'">'
          +'<span class="sec-ico">'+s.icon+'</span>'
          +'<h2>'+esc(s.label)+'</h2>'
          +'<span class="sec-count">'+s.items.length+' 条</span></div>'
          +body+'</section>';
      }).join("");
    }

    function render(env){
      var m=normalize(env);
      document.getElementById("hero").innerHTML=renderHero(m);
      document.getElementById("nav").innerHTML=renderNav(m);
      document.getElementById("content").innerHTML=renderContent(m);
      var foot='数据来源：AI HOT（aihot.virxact.com）';
      if(env.fetchedAt)foot+=' · 拉取于 '+esc(env.fetchedAt.replace('T',' ').slice(0,16));
      document.getElementById("foot-meta").textContent=foot;
      document.title='AI HOT 晨报 · '+(env.usedDate||"");
      return m;
    }

    // initial render
    var dataEl=document.getElementById("aihot-data");
    var env=JSON.parse(dataEl.textContent);
    render(env);

    // refresh (best-effort): refetch latest daily; fallback through CORS proxies
    var btn=document.getElementById("refreshBtn");
    var toast=document.getElementById("toast");
    var toastT;
    function showToast(msg){toast.textContent=msg;toast.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){toast.classList.remove("show");},2600);}
    function tryFetch(url,opts){return fetch(url,opts);}
    btn.addEventListener("click",function(){
      btn.disabled=true;showToast("正在刷新…");
      var direct="https://aihot.virxact.com/api/public/daily";
      var proxies=[
        "https://api.allorigins.win/raw?url="+encodeURIComponent(direct),
        "https://corsproxy.io/?url="+encodeURIComponent(direct)
      ];
      var attempts=[direct].concat(proxies);
      (function next(i){
        if(i>=attempts.length){btn.disabled=false;showToast("刷新失败：浏览器网络/CORS 受限，已保留当前内容");return;}
        tryFetch(attempts[i],{headers:{"User-Agent":"Mozilla/5.0"}}).then(function(r){return r.ok?r.json():Promise.reject("http "+r.status);}).then(function(json){
          var ne={source:json,usedDate:json.date,isToday:false,fallback:true,fetchedAt:new Date().toISOString()};
          render(ne);btn.disabled=false;showToast("已更新至最新一期（"+json.date+"）");
        }).catch(function(e){next(i+1);});
      })(0);
    });
  })();
  </script>
