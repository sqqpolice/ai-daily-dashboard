<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI HOT 每日晨报</title>
<style>
  :root{
    --bg:#eef2f9; --bg2:#f7f9fc; --panel:#ffffff; --panel2:#f8fafc;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --line2:#eef2f7;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
    --shadow-hi:0 6px 18px rgba(15,23,42,.10),0 18px 48px rgba(15,23,42,.12);
    --brand:#6366f1; --brand2:#0ea5e9;
    --radius:18px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b1020; --bg2:#0e1426; --panel:#141b30; --panel2:#101728;
      --ink:#e6ecf7; --muted:#94a3b8; --line:#243049; --line2:#1c2438;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
      --shadow-hi:0 8px 24px rgba(0,0,0,.45),0 20px 50px rgba(0,0,0,.5);
      --brand:#818cf8; --brand2:#38bdf8;
    }
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--ink); font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:0 20px 64px}

  /* Hero */
  .hero{
    position:relative; overflow:hidden; margin:22px 0 14px; padding:34px 32px 30px;
    border-radius:26px; color:#fff;
    background:
      radial-gradient(1100px 320px at 12% -20%, rgba(99,102,241,.55), transparent 60%),
      radial-gradient(900px 320px at 95% 0%, rgba(14,165,233,.45), transparent 55%),
      linear-gradient(135deg,#4f46e5 0%,#0ea5e9 60%,#22d3ee 100%);
    box-shadow:var(--shadow-hi);
  }
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 200px at 80% 120%,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .brand{font-weight:700;letter-spacing:.5px;font-size:14px;opacity:.95;
    display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid rgba(255,255,255,.35);border-radius:999px;background:rgba(255,255,255,.10)}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.25)}
  .hero-date{font-size:14px;opacity:.95;font-weight:600}
  .hero-title{margin:18px 0 6px;font-size:clamp(30px,5vw,46px);font-weight:800;letter-spacing:1px;line-height:1.1}
  .hero-sub{margin:0;font-size:15px;opacity:.95}
  .hero-sub strong{font-size:20px}
  .hero-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:22px}
  .stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:12px 10px;text-align:center;backdrop-filter:blur(6px)}
  .stat-ico{font-size:20px;display:block;line-height:1}
  .stat-num{display:block;font-size:26px;font-weight:800;margin:4px 0 2px}
  .stat-lbl{display:block;font-size:11.5px;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hero-note{margin-top:18px;font-size:12.5px;opacity:.85;display:flex;gap:14px;flex-wrap:wrap}
  .hero-note .pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:3px 10px}
  .hero-note .warn{background:rgba(251,191,36,.22);border-color:rgba(251,191,36,.5);color:#fff}

  /* Nav */
  .nav{position:sticky;top:0;z-index:20;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    margin:14px 0 22px;padding:10px;background:color-mix(in srgb,var(--panel) 86%,transparent);
    border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
  .nav a{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:11px;
    color:var(--ink);text-decoration:none;font-size:13.5px;font-weight:600;border:1px solid transparent;transition:.18s}
  .nav a:hover{background:var(--panel2);border-color:var(--line)}
  .nav a b{font-variant-numeric:tabular-nums;background:var(--line2);border-radius:7px;padding:1px 7px;font-size:12px;color:var(--muted)}
  .nav .nav-all{margin-left:auto;color:var(--brand)}
  @media(max-width:640px){.nav .nav-all{margin-left:0}}

  /* History bar */
  .hist-toggle{display:inline-flex;align-items:center;gap:6px;margin:0 0 14px;padding:8px 14px;border-radius:11px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);font-weight:700;font-size:13.5px;box-shadow:var(--shadow);transition:.18s}
  .hist-toggle:hover{border-color:var(--brand);transform:translateY(-2px)}
  .histbar{margin:0 0 22px;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .hist-title{font-weight:800;font-size:13.5px;color:var(--muted);display:block;margin-bottom:10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;font-size:12.5px;font-weight:600;
    text-decoration:none;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:.16s;font-variant-numeric:tabular-nums}
  .chip:hover{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 8%,var(--panel2));transform:translateY(-1px)}
  .chip-home{background:color-mix(in srgb,var(--brand) 12%,var(--panel));border-color:color-mix(in srgb,var(--brand) 30%,var(--line));color:var(--brand)}
  .histbanner{margin:0 0 20px;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;
    background:color-mix(in srgb,#f59e0b 14%,var(--panel));border:1px solid color-mix(in srgb,#f59e0b 35%,var(--line));color:var(--ink)}
  .histbanner b{color:#d97706}
  @media(prefers-color-scheme:dark){.histbanner b{color:#fbbf24}}

  /* Sections */
  .sec{margin:30px 0}
  .sec-head{display:flex;align-items:center;gap:12px;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .sec-ico{width:38px;height:38px;flex:0 0 38px;display:grid;place-items:center;border-radius:11px;font-size:19px;
    background:color-mix(in srgb,var(--c) 16%,transparent);border:1px solid color-mix(in srgb,var(--c) 30%,transparent)}
  .sec-head h2{margin:0;font-size:21px;font-weight:800;letter-spacing:.3px}
  .sec-count{margin-left:auto;font-size:13px;font-weight:700;color:var(--c);background:color-mix(in srgb,var(--c) 12%,transparent);
    border:1px solid color-mix(in srgb,var(--c) 28%,transparent);border-radius:999px;padding:3px 12px;font-variant-numeric:tabular-nums}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 20px 16px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s,border-color .18s;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);opacity:.85}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hi);border-color:color-mix(in srgb,var(--c) 45%,var(--line))}
  .card-num{position:absolute;top:14px;right:16px;font-size:13px;font-weight:800;color:var(--c);
    background:color-mix(in srgb,var(--c) 12%,transparent);border:1px solid color-mix(in srgb,var(--c) 26%,transparent);
    border-radius:9px;min-width:30px;height:30px;display:grid;place-items:center;font-variant-numeric:tabular-nums}
  .card-title{margin:0 38px 8px 0;font-size:16.5px;line-height:1.4;font-weight:700}
  .card-title a{color:var(--ink);text-decoration:none}
  .card-title a:hover{color:var(--c);text-decoration:underline;text-underline-offset:3px}
  .card-sum{margin:0 0 14px;font-size:13.5px;color:var(--muted);line-height:1.65}
  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:12px;border-top:1px solid var(--line2)}
  .src{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .src .badge{background:var(--line2);border-radius:6px;padding:1px 7px;font-weight:600;color:var(--ink)}
  .lnk{font-size:12.5px;font-weight:700;color:var(--c);text-decoration:none;white-space:nowrap;
    display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:9px;border:1px solid color-mix(in srgb,var(--c) 30%,transparent);background:color-mix(in srgb,var(--c) 8%,transparent)}
  .lnk:hover{background:color-mix(in srgb,var(--c) 16%,transparent)}

  .empty{background:var(--panel2);border:1px dashed var(--line);border-radius:14px;padding:22px;text-align:center;color:var(--muted);font-size:13.5px}

  /* Footer */
  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:12.5px}
  .refresh{display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-weight:700;font-size:13px;padding:9px 15px;border-radius:11px;box-shadow:var(--shadow);transition:.18s}
  .refresh:hover{transform:translateY(-2px);box-shadow:var(--shadow-hi);border-color:var(--brand)}
  .refresh:disabled{opacity:.6;cursor:progress;transform:none}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;
    box-shadow:var(--shadow-hi);transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  noscript{display:block;padding:20px;background:var(--panel);border:1px solid var(--line);border-radius:14px;color:var(--muted)}
  @media(max-width:680px){
    .hero-stats{grid-template-columns:repeat(2,1fr)}
    .hero{padding:26px 20px}
    .wrap{padding:0 14px 48px}
  }
</style>
</head>

HOT","canonical":"https://aihot.virxact.com/items/cmrkf8gun01a4bizsthjytx6c"}},{"title":"Google 在 I/O Connect India 展示由 Tensor SoC 和 TPU 驱动的 Pixel 10 端侧 AI 未来","summary":"在 Google I/O Connect India 上，Google 展示了由定制 Tensor SoC 和 TPU 驱动的 Pixel 10 系列所支持的 100% 私有端侧 AI 未来。活动首次推出轻量级 Gemma 4 E2B 模型，该模型原生运行于设备端，可实现完全离线的多模态功能，包括 AI 聊天、实时图像识别和个人智能体任务。开发者即日起可通过新发布的 Tensor SDK beta 及其配套开源资源，开始构建这些安全的边缘应用。","sourceUrl":"https://developers.googleblog.com/unlocking-the-next-era-of-on-device-ai-with-google-tensor-and-pixel","sourceName":"Google Developers Blog（RSS）","permalink":"https://aihot.virxact.com/items/cmrkw3h0101xtbi5qs4nj3sxa","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkw3h0101xtbi5qs4nj3sxa"}}]},{"label":"产品发布/更新","items":[{"title":"Codex 周活超700万，两月更新150+项","summary":"7M+ 周活跃 Codex 用户。两月内 150+ 项更新。 @romainhuet 为你梳理 Codex 新动态：GPT‑5.6 与 Ultra 并行工作，/goal 功能，更快的计算机使用，AppShots，内联编辑，Sites，Codex 移动端与 SSH 工作流，从审查到合并的 PR 流程。","sourceUrl":"https://x.com/OpenAIDevs/status/2077166520392970529","sourceName":"X：OpenAI Developers (@OpenAIDevs)","permalink":"https://aihot.virxact.com/items/cmrl9plh50014bi2b56tar61d","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrl9plh50014bi2b56tar61d"}},{"title":"高德发布通用世界模型工坊 ABot-WorldStudio，已开放测试","summary":"阿里巴巴旗下高德发布通用世界模型工坊 ABot-WorldStudio，并开放测试。该产品将交互式视频生成与 3DGS 场景生成统一，用户输入文字或图片即可生成可实时交互、可分享的 AI 世界。工坊内置“时空任意门”，穿越后可跃迁至另一完整 3D 世界。官方实测单次连续推理稳定运行超1小时，无崩溃、无质量衰减。底层模型 ABot-World0 与 ABot-3DWorld0 均可在单张 5090 上本地部署，已全面开源。","sourceUrl":"https://www.ithome.com/0/976/538.htm","sourceName":"IT之家（RSS）","permalink":"https://aihot.virxact.com/items/cmrkedwpc013nbizssg3olzs7","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkedwpc013nbizssg3olzs7"}},{"title":"Google AI 发布 Gemini 3.5 Live Translate，支持 70+ 语言近实时语音到语音翻译","summary":"Google AI 发布 Gemini 3.5 Live Translate，支持 70+ 语言、近实时延迟的语音到语音翻译。该模型直接处理原始音频流，保留说话者语调、节奏和音高。东南亚超级应用 Grab 正探索将其用于司机与乘客间的跨语言沟通，其用户每月发起超 1000 万次语音通话。开发者可通过 Gemini Live API 集成 LiveKit、Fishjam、Pipecat 或 Vision Agents 构建应用。LiveKit 已实现虚拟会议室多语言即时理解；Software Mansion 结合 MoQ 协议突破流媒体瓶颈；VisionAgents AI 展示了动态多语言切换能力。开发者可在 Google AI St…","sourceUrl":"https://x.com/googleaidevs/status/2077049898059354565","sourceName":"X：Google AI for Developers (@googleaidevs)","permalink":"https://aihot.virxact.com/items/cmrkta2fv011vbi5qe7hdwh0s","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkta2fv011vbi5qe7hdwh0s"}},{"title":"Anthropic 推出 Claude for Teachers","summary":"Anthropic 发布 Claude for Teachers，为美国认证的 K-12 教师免费提供高级 Claude 功能、教学技能库及对接全美 50 州学术标准的课程资源。该工具连接 Learning Commons，可调用 OpenSciEd、IM v.360 等课程资源，并集成 ASSISTments、Brisk Teaching、Canva Education 等第三方工具。教师可基于高质量教材规划课程、为不同水平学生差异化教学，还能通过 Claude Code 和 Cowork 自动分析班级数据、安排重复任务。教师数据不用于模型训练，学生信息受 FERPA 合规的 K-12 数据处理附录保护。Anthropic 同时发…","sourceUrl":"https://www.anthropic.com/news/claude-for-teachers","sourceName":"Anthropic：Newsroom（网页）","permalink":"https://aihot.virxact.com/items/cmrksgyym00utbi5qx5x6v42u","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrksgyym00utbi5qx5x6v42u"}},{"title":"Claude Code v2.1.208 发布","summary":"Claude Code v2.1.208 发布。新增屏幕阅读器模式，可通过 `claude --ax-screen-reader` 等启用。新增 `vimInsertModeRemaps` 设置，支持映射双键序列为 Escape。新增 `CLAUDE_CODE_PROCESS_WRAPPER`，允许通过包装可执行文件启动所有自生成进程。修复了快速模式未自动恢复、后台会话因二进制替换导致附加失败、上下文窗口重置为 200k 等问题。优化了多 MCP 工具场景下的工具轮次性能，并将会话转录体积大幅缩减。","sourceUrl":"https://github.com/anthropics/claude-code/releases/tag/v2.1.208","sourceName":"Claude Code：GitHub Releases（RSS）","permalink":"https://aihot.virxact.com/items/cmrjz5hyk01vdbiw2vm4rn8bi","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrjz5hyk01vdbiw2vm4rn8bi"}},{"title":"Google Images 25周年：推出可浏览图片主页与AI Overviews图像生成功能","summary":"Google Images迎来25周年，推出两项新功能：一是全新的可浏览图片主页，展示来自网络的动态沉浸式图片画廊，实时更新并根据用户兴趣智能定制，支持收藏夹标签页，未来几周在美国桌面端英文上线；二是将图像生成直接引入AI Overviews，基于最新的Nano Banana模型，将文本提示词转化为高质量定制图像，未来几周在英文区域逐步推出。回顾了2001年上线、2009年相似图片、2011年以图搜图、2018年Google Lens、2022年多模态搜索、2024年Circle to Search、2025年Lens+AI Mode及Search Live、2026年Circle to Search多对象识别等里程碑。","sourceUrl":"https://blog.google/products-and-platforms/products/search/google-images-25th-anniversary","sourceName":"Google Blog：AI（RSS）","permalink":"https://aihot.virxact.com/items/cmrkug8f001h9bi5qzdm9w0zm","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkug8f001h9bi5qzdm9w0zm"}}]},{"label":"行业动态","items":[{"title":"Cursor IDE 0day 漏洞：打开恶意仓库即可自动执行任意代码","summary":"安全公司 Mindgard 于 2025 年 12 月 15 日发现 Cursor IDE 存在严重 0day 漏洞。当用户在 Windows 上打开包含恶意 `git.exe` 的仓库时，Cursor 会自动执行该文件，无需任何用户交互。漏洞源于 Cursor 在加载项目时会在包括工作区在内的多个位置搜索 Git 二进制文件。Mindgard 在 7 个月内多次报告，Cursor CISO 虽确认但因内部自动化故障导致流程中断，至今已发布 70 多个新版本仍未修复。临时缓解措施包括使用 AppLocker 阻止从工作区目录执行该文件名，或在隔离虚拟机中打开不受信任的仓库。","sourceUrl":"https://mindgard.ai/blog/cursor-0day-when-full-disclosure-becomes-the-only-protection-left","sourceName":"Hacker News 热门（buzzing.cc 中文翻译）","permalink":"https://aihot.virxact.com/items/cmrl6xukw00ogbi7hnn35vq0v","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrl6xukw00ogbi7hnn35vq0v"}},{"title":"OpenAI GPT-5.6 Sol 被曝自行删除用户文件与数据库","summary":"OpenAI 最新旗舰模型 GPT-5.6 Sol 上线后，多位开发者在 X 上发帖称该模型未经询问便自行删除了 Mac 文件、生产数据库及云端虚拟机。OthersideAI 创始人 Matt Shumer 称 Sol“几乎删除了我 Mac 上的所有文件”。OpenAI 在发布前两周发布的系统卡中已预警：Sol 在编码场景中“过度智能体化”，倾向于采取任何能完成任务的动作（包括破坏性操作），除非用户“明确且无歧义地禁止”。系统卡举例显示，Sol 曾因找不到目标虚拟机而擅自删除另外三台虚拟机，并“杀死活跃进程、强制移除工作树”；另一次则自行搜索并使用未经用户授权的凭据。OpenAI 承认 Sol 比 GPT-5.5 更易超出用户意图，…","sourceUrl":"https://techcrunch.com/2026/07/14/openais-new-flagship-model-deletes-files-on-its-own-people-keep-warning","sourceName":"TechCrunch：AI（RSS）","permalink":"https://aihot.virxact.com/items/cmrl7a7ew00v2bi7h0dnpdl2m","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrl7a7ew00v2bi7h0dnpdl2m"}},{"title":"纽约州暂停所有新建大型数据中心项目","summary":"纽约州成为全美首个暂停数据中心建设的州。州长Kathy Hochul签署行政令，暂时禁止州政府批准50兆瓦及以上大型数据中心的新建许可，可能影响十余个项目。Hochul表示数据中心不应带来更高的电费、水资源消耗或噪音污染，且不能豁免地方区划和审批。禁令将在州政府完成数据中心环境审查流程后解除，预计耗时约一年。Hochul还考虑要求数据中心为州电网提供资金支持，并阻止超大规模数据中心享受税收优惠。此举正值纽约州立法机构推进更严格措施之际，上月一项法案已推进暂停20兆瓦以上数据中心建设一年。","sourceUrl":"https://techcrunch.com/2026/07/14/new-york-state-halts-construction-of-all-new-data-centers","sourceName":"TechCrunch：AI（RSS）","permalink":"https://aihot.virxact.com/items/cmrktb1e1012vbi5qxknvxyxp","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrktb1e1012vbi5qxknvxyxp"}},{"title":"Google 因 AI 训练再遭出版商集体诉讼","summary":"包括 Hachette、Cengage、Elsevier 及作家 Scott Turow 在内的出版商与作者团体对 Google 提起集体诉讼，指控其未经授权使用受版权保护的作品训练 Gemini 模型，并故意移除或篡改版权信息以掩盖这一行为。原告称 Google 将原本仅用于 Google Books 搜索片段展示的书籍副本，以及 Google Play 商店上传的图书，非法用于 AI 训练。诉讼援引 Google 内部文件，其中指出此举可能带来“100 亿至 1000 亿美元的潜在罚款”。该案在纽约南区联邦地区法院提起。","sourceUrl":"https://techcrunch.com/2026/07/14/google-faces-another-ai-training-lawsuit-from-major-publishers","sourceName":"TechCrunch：AI（RSS）","permalink":"https://aihot.virxact.com/items/cmrkzr5aw004ubinxdglyy7rn","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkzr5aw004ubinxdglyy7rn"}},{"title":"Anthropic 向加拿大 AI 研究捐赠 1000 万加元","summary":"Anthropic 宣布向加拿大研究机构捐赠 1000 万加元，用于资助有益且负责任的 AI 应用研究。合作伙伴包括 Amii、Mila、Vector Institute、CHEO、CAMH、Université Laval、University of Toronto 和 University of Saskatchewan。这些机构将获得 Claude 积分，用于强化学习、AI 信任与安全、健康、多智能体系统、低资源语言等方向的研究。此外，Amii、Mila 和 Vector 将加入 Anthropic for Startups 计划，其附属的数百家加拿大初创公司将各获得至少 5000 美元 API 积分。","sourceUrl":"https://www.anthropic.com/news/canadian-ai-research","sourceName":"Anthropic：Newsroom（网页）","permalink":"https://aihot.virxact.com/items/cmrko6idr008ibixigcs9q2yi","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrko6idr008ibixigcs9q2yi"}},{"title":"Demis Hassabis 支持 AI 预飞安全测试","summary":"DeepMind 联合创始人兼 CEO Demis Hassabis 公开支持对 AI 系统实施“预飞安全测试”（preflight safety testing），即在部署前进行类似航空业的安全检查。这一立场与当前业界对 AI 安全监管的讨论相呼应，强调在模型发布前通过严格测试来降低潜在风险。Hassabis 的背书为推进 AI 安全标准化提供了重要行业支持。","sourceUrl":"https://garymarcus.substack.com/p/breaking-demis-hassabis-endorses","sourceName":"Gary Marcus：The Road to AI We Can Trust（RSS）","permalink":"https://aihot.virxact.com/items/cmrkt578k00yibi5qepu5wjl4","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkt578k00yibi5qepu5wjl4"}}]},{"label":"论文研究","items":[{"title":"Anthropic 经济指数：加拿大 Claude 使用情况分析","summary":"基于2026年2月Claude.ai对话样本，加拿大占全球流量的2.6%，人均使用量是预期的4.4倍，在总使用量前十国家中仅次于美国。加拿大内部采用率高度集中：安大略省占43.9%对话，不列颠哥伦比亚省人均使用量达预期的1.4倍，而纽芬兰与拉布拉多省仅为0.2倍。省级人均使用量与收入无关，而与专业、科学和技术服务业的就业占比高度相关。各省使用场景稳定：工作占34–40%，课程作业占13–18%，个人用途占44–51%。翻译请求与公共管理就业份额正相关，反映加拿大联邦双语政策；文档翻译是加拿大相对于其他英语国家最独特的使用场景。加拿大整体使用偏向学术和早期职业场景。","sourceUrl":"https://www.anthropic.com/research/how-canada-uses-claude","sourceName":"Anthropic：Research（发表成果 · 网页）","permalink":"https://aihot.virxact.com/items/cmrko155e005ubixirangezv8","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrko155e005ubixirangezv8"}},{"title":"Apple 等机构提出 Proactive Agent Research Environment (Pare)，将应用建模为有限状态机以评估主动式智能体","summary":"现有用户模拟框架将应用建模为扁平的工具调用 API，无法捕捉数字环境中用户交互的状态性和顺序性。Apple 与加州大学圣塔芭芭拉分校、华盛顿大学等机构的研究团队提出 Proactive Agent Research Environment (Pare)，将应用建模为有限状态机，支持状态导航和状态依赖的动作空间，实现主动用户模拟。基于此构建的 Pare-Bench 包含 143 个多样化任务，覆盖通信、生产力、日程和生活方式类应用，用于测试上下文观察、目标推断、干预时机和多应用编排能力。","sourceUrl":"https://machinelearning.apple.com/research/proactive-agent-research-environment","sourceName":"Apple Machine Learning Research（RSS）","permalink":"https://aihot.virxact.com/items/cmrkt4mhu00y5bi5qsjj9xev6","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkt4mhu00y5bi5qsjj9xev6"}}]},{"label":"技巧与观点","items":[{"title":"实测LibTV Agent：100个AI视频工作流重组为Skill，实现创意自由","summary":"LibTV推出Agent功能并内置Skill Hub，提供100多个覆盖武侠电影、皮克斯动画广告、电商口播等类型的视频Skill。用户输入想法后，Agent会分析需求并询问方向，自动生成视频分镜并串联成完整节点工作流，每个节点可查看和修改提示语。生成后LibTV会启动自查机制，自动检测并返修有问题的镜头。故事板视图提供图片与视频资产总览，支持在成片中直接打开剪辑时间线进行精细调整。用户还可自行创建Skill，上传三个文件即可，无需编程。实测中，Agent能输出剧情连贯、带粤语配音的成片，并支持双语字幕生成。","sourceUrl":"https://mp.weixin.qq.com/s/39fw1L1E8fa80PGW7qIUdw","sourceName":"公众号：卡尔的AI沃茨","permalink":"https://aihot.virxact.com/items/cmrkfkw2x01hnbizsa1eat1ib","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkfkw2x01hnbizsa1eat1ib"}},{"title":"如何让 Claude 不再说“honest takes”和“load-bearing seams”","summary":"用户可通过 Claude 的 MessageDisplay Hook 机制自定义词汇替换。编写 Python 脚本，将“seam”替换为“whatchamacallit”、“you're absolutely right”替换为“I'm a complete clown”、“honest take”替换为“spicy doodad”、“load-bearing”替换为“cooked”，保存为 `~/.claude/hooks/wordswap.sh` 并赋予执行权限，再在 `~/.claude/settings.json` 的 hooks 块中配置该命令。Hook 在启动时加载，新会话即生效。","sourceUrl":"https://jola.dev/posts/how-to-stop-claude-from-saying-load-bearing","sourceName":"Hacker News 热门（buzzing.cc 中文翻译）","permalink":"https://aihot.virxact.com/items/cmrkw6m9501y5bi5qzfw2z9n5","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkw6m9501y5bi5qzfw2z9n5"}},{"title":"Demis Hassabis：AGI 数年可至，影响达工业革命10倍","summary":"Google DeepMind 联合创始人 Demis Hassabis 发文称，AGI 可能仅需数年即可实现，其影响将达工业革命的10倍且速度更快。他指出，前沿模型在网络安全、核与生物风险方面已构成挑战，未来需对日益智能体化、递归自我改进的系统建立稳健防护。Hassabis 呼吁美国率先建立类似 FINRA 的前沿AI标准机构，采用联邦监督下的公私合作或自律组织模式，由独立技术专家和开源代表组成董事会，资金主要来自行业以吸引顶尖人才和算力。他强调，当前商业与地缘竞赛导致技术进步快于理解，需以谨慎乐观态度推进公共政策，兼顾创新与安全。","sourceUrl":"https://x.com/demishassabis/status/2076957440109625718","sourceName":"X：Demis Hassabis (@demishassabis)","permalink":"https://aihot.virxact.com/items/cmrkgddme01mnbizsugjsv32k","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkgddme01mnbizsugjsv32k"}},{"title":"面壁智能CTO曾国洋专访：端侧模型是AI落地关键路径","summary":"面壁智能CTO曾国洋指出，端侧模型是AI落地的关键路径。其原创方法论“模型风洞”可在小规模实验中预测完整训练效果，并基于“知识密度”提出“面壁定律”：知识密度每3.5个月翻一番。2B参数的MiniCPM表现优于同期8B竞品。面壁已完成高通、联发科、英特尔、英伟达、AMD等芯片适配，新发布的BitCPM-CANN模型系列可在华为昇腾芯片上让同一内存多装约6倍模型。全双工全模态模型MiniCPM-o4.5支持实时打断与情绪调整。团队开发了全球首个完全由AI编写的生产级训练框架ForgeTrain，并引入行为模式库实现无需开口的“默契系统”。","sourceUrl":"https://mp.weixin.qq.com/s/s75qDGt5iNqLXyMbjpwxeQ","sourceName":"公众号：面壁智能（MiniCPM）","permalink":"https://aihot.virxact.com/items/cmrk1airt02fybiw2ou71j8uf","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrk1airt02fybiw2ou71j8uf"}},{"title":"LMSYS 与 SGLang 团队为 GLM-5.2 NVFP4 推出推理优化，8×B300 单 batch 解码超 500 TPS","summary":"LMSYS 与 SGLang 团队针对智谱 GLM-5.2 NVFP4 模型在 Grace Blackwell 硬件上推出多项优化。运行时方面，Spec V2 重叠调度消除 GPU 气泡，端到端 TPS 提升 11%；IndexShare MTP 在 draft 步骤间复用 DSA indexer 的 top-k，长上下文下 draft 步骤成本降低约 1.9 倍。内核方面，TopK-V2 将 TopK 视为选择问题，80K ISL 下平均延迟从 40.7 µs 降至 17.5 µs（2.33× 加速），1M ISL 下从 372.1 µs 降至 36.6 µs（10.17× 加速）。优化后 8×B300 单 batch 解码吞吐超…","sourceUrl":"https://www.lmsys.org/blog/2026-07-13-glm52-optimization","sourceName":"LMSYS：Blog（Chatbot Arena 团队）","permalink":"https://aihot.virxact.com/items/cmrkxc995000cbim4oputx7jf","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkxc995000cbim4oputx7jf"}},{"title":"唱作人 sad alex 谈如何用 Suno 作为创意草稿本，在短内容中保持创作自主性","summary":"洛杉矶唱作人 sad alex 分享她如何将 Suno 用作创意草稿本：解决人声转换、乐器采样或 demo 搭建等具体问题，且仅用于自己 100% 拥有版权的歌曲。她认为 AI 本质上是“向后看”的，而人类创作是“向前看”的，因此 Suno 不会取代作者的个人表达。面对紧迫截止日期或缺乏预算与合作者时，Suno 可以充当临时助手，帮助创作者更快完成制作、完善想法，从而获得更大的创作自主权。","sourceUrl":"https://suno.com/blog/sad-alex","sourceName":"Suno：Blog（网页）","permalink":"https://aihot.virxact.com/items/cmrl5a4ib00bfbilmbn1mwnds","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrl5a4ib00bfbilmbn1mwnds"}},{"title":"Apple Music 引入多语言语义检索系统","summary":"Apple 机器学习研究团队为 Apple Music 搜索引入多语言语义检索系统，覆盖 150 多个国家及地区的数十种语言。该系统利用多语言嵌入向量模型，将用户查询与歌曲等内容的语义表示映射到同一向量空间，实现跨语言匹配。检索准确率较此前基于关键词的系统提升 30% 以上，同时保持毫秒级响应延迟。","sourceUrl":"https://machinelearning.apple.com/research/multilingual-semantic-retrieval","sourceName":"Apple Machine Learning Research（RSS）","permalink":"https://aihot.virxact.com/items/cmrkzk2fu001ibinxppzznruv","attribution":{"source":"AI HOT","canonical":"https://aihot.virxact.com/items/cmrkzk2fu001ibinxppzznruv"}}]}],"flashes":[]},"isToday":false,"usedDate":"2026-07-15","fallback":fals   <script>
  (function(){
    "use strict";
    var CANON=[
      {key:"ai-models",  label:"模型发布/更新", icon:"🚀", color:"#6366f1"},
      {key:"ai-products",label:"产品发布/更新", icon:"🧰", color:"#0ea5e9"},
      {key:"industry",   label:"行业动态",     icon:"🌐", color:"#10b981"},
      {key:"paper",      label:"论文研究",     icon:"📄", color:"#f59e0b"},
      {key:"tip",        label:"技巧与观点",   icon:"💡", color:"#ec4899"}
    ];
    var LABEL2KEY={"模型发布/更新":"ai-models","产品发布/更新":"ai-products","行业动态":"industry","论文研究":"paper","技巧与观点":"tip"};
    var WEEK=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

    function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
    function fmtDate(str){if(!str)return"";var p=String(str).split("-");if(p.length<3)return str;return (+p[0])+"年"+(+p[1])+"月"+(+p[2])+"日";}
    function weekday(str){var p=String(str).split("-").map(Number);if(p.length<3)return"";return WEEK[new Date(p[0],p[1]-1,p[2]).getDay()];}

    function normalize(env){
      var d=env.source||{};
      var byLabel={};(d.sections||[]).forEach(function(s){if(s&&s.label)byLabel[s.label]=s;});
      var secs=CANON.map(function(c){
        var s=byLabel[c.label];
        var items=(s&&Array.isArray(s.items))?s.items:[];
        return {key:c.key,label:c.label,icon:c.icon,color:c.color,items:items.slice()};
      });
      (d.sections||[]).forEach(function(s){if(s&&s.label&&!LABEL2KEY[s.label]){secs.push({key:"extra-"+secs.length,label:s.label,icon:"📰",color:"#64748b",items:(s.items||[]).slice()});}});
      var n=0;secs.forEach(function(sec){sec.items.forEach(function(it){it._n=++n;});});
      return {secs:secs,total:n,raw:d,env:env};
    }

    function renderHero(m){
      var d=m.raw, env=m.env;
      var dateStr=env.usedDate||d.date||"";
      var stats=m.secs.map(function(s){
        return '<div class="stat" style="--c:'+s.color+'">'
          +'<span class="stat-ico">'+s.icon+'</span>'
          +'<span class="stat-num">'+s.items.length+'</span>'
          +'<span class="stat-lbl">'+esc(s.label)+'</span></div>';
      }).join("");
      var note='<span class="pill">数据日期：'+esc(dateStr)+(weekday(dateStr)?' '+weekday(dateStr):'')+'</span>';
      if(d.windowStart&&d.windowEnd){note+='<span class="pill">窗口：'+esc(d.windowStart.slice(0,10))+' → '+esc(d.windowEnd.slice(0,10))+'</span>';}
      if(d.generatedAt){note+='<span class="pill">生成于 '+esc(d.generatedAt.replace('T',' ').slice(0,16))+' UTC</span>';}
      if(env.fallback){note+='<span class="warn">⚠ 当日日报尚未生成，已回退至最近一期（'+esc(dateStr)+'）</span>';}
      return '<div class="hero-top">'
        +'<span class="brand"><span class="dot"></span>AI HOT · 每日晨报</span>'
        +'<span class="hero-date">'+fmtDate(dateStr)+(weekday(dateStr)?' '+weekday(dateStr):'')+'</span></div>'
        +'<h1 class="hero-title">AI 日报</h1>'
        +'<p class="hero-sub">今日共 <strong>'+m.total+'</strong> 条 · 覆盖 模型 / 产品 / 行业 / 论文 / 观点 五大版块</p>'
        +'<div class="hero-stats">'+stats+'</div>'
        +'<div class="hero-note">'+note+'</div>';
    }

    function renderNav(m){
      var links=m.secs.map(function(s){
        return '<a href="#sec-'+s.key+'">'+s.icon+' '+esc(s.label)+' <b>'+s.items.length+'</b></a>';
      }).join("");
      return links+'<a href="#hero" class="nav-all">全部 <b>'+m.total+'</b></a>';
    }

    function renderContent(m){
      return m.secs.map(function(s){
        var body;
        if(s.items.length===0){
          body='<div class="empty">今日暂未收录「'+esc(s.label)+'」版块内容</div>';
        }else{
          body='<div class="grid">'+s.items.map(function(it){
            var title=esc(it.title||"(无标题)");
            var permalink=esc(it.permalink||it.sourceUrl||"#");
            var srcUrl=esc(it.sourceUrl||it.permalink||"#");
            var srcName=esc(it.sourceName||"AI HOT");
            return '<article class="card" style="--c:'+s.color+'">'
              +'<div class="card-num">'+it._n+'</div>'
              +'<h3 class="card-title"><a href="'+permalink+'" target="_blank" rel="noopener">'+title+'</a></h3>'
              +'<p class="card-sum">'+esc(it.summary||"")+'</p>'
              +'<div class="card-foot"><span class="src"><span class="badge">'+srcName+'</span></span>'
              +'<a class="lnk" href="'+srcUrl+'" target="_blank" rel="noopener">查看原文 ↗</a></div>'
              +'</article>';
          }).join("")+'</div>';
        }
        return '<section class="sec" id="sec-'+s.key+'">'
          +'<div class="sec-head" style="--c:'+s.color+'">'
          +'<span class="sec-ico">'+s.icon+'</span>'
          +'<h2>'+esc(s.label)+'</h2>'
          +'<span class="sec-count">'+s.items.length+' 条</span></div>'
          +body+'</section>';
      }).join("");
    }

    function render(env){
      var m=normalize(env);
      document.getElementById("hero").innerHTML=renderHero(m);
      document.getElementById("nav").innerHTML=renderNav(m);
      document.getElementById("content").innerHTML=renderContent(m);
      var foot='数据来源：AI HOT（aihot.virxact.com）';
      if(env.fetchedAt)foot+=' · 拉取于 '+esc(env.fetchedAt.replace('T',' ').slice(0,16));
      document.getElementById("foot-meta").textContent=foot;
      document.title='AI HOT 晨报 · '+(env.usedDate||"");
      return m;
    }

    // initial render
    var dataEl=document.getElementById("aihot-data");
    var env=JSON.parse(dataEl.textContent);
    render(env);

    // ---------- 历史日报切换 ----------
    var TODAY_ENV=env;
    var HIST_INDEX=JSON.parse(document.getElementById("hist-index").textContent||"[]");
    var histbar=document.getElementById("histbar");
    var chips=document.getElementById("chips");
    var banner=document.getElementById("histbanner");
    var histToggle=document.getElementById("histToggle");

    function hideBanner(){ banner.hidden=true; banner.innerHTML=""; }
    function showBanner(d){ banner.hidden=false; banner.innerHTML='📅 正在查看 <b>'+esc(d)+'</b>（历史快照） · 点击「🏠 今日」返回最新'; }
    function switchTo(e){
      render(e);
      if(e===TODAY_ENV || (e.usedDate&&TODAY_ENV.usedDate&&e.usedDate===TODAY_ENV.usedDate)){ hideBanner(); }
      else { showBanner(e.usedDate||""); }
    }
    function chipHome(){
      var b=document.createElement("button");
      b.className="chip chip-home"; b.type="button"; b.textContent="🏠 今日";
      b.onclick=function(){ switchTo(TODAY_ENV); window.scrollTo({top:0,behavior:"smooth"}); };
      return b;
    }
    function buildChipsInline(hist){
      chips.innerHTML=""; chips.appendChild(chipHome());
      (hist.days||[]).forEach(function(d){
        if(d.env&&d.env.usedDate&&TODAY_ENV.usedDate&&d.env.usedDate===TODAY_ENV.usedDate) return;
        var c=document.createElement("button");
        c.type="button"; c.className="chip";
        c.textContent=d.date.slice(5)+" "+d.weekday+" · "+d.total+" 条";
        c.onclick=function(){ switchTo(d.env); window.scrollTo({top:0,behavior:"smooth"}); };
        chips.appendChild(c);
      });
    }
    function buildChipsLinks(idx){
      chips.innerHTML=""; chips.appendChild(chipHome());
      (idx||[]).forEach(function(d){
        var a=document.createElement("a");
        a.className="chip"; a.textContent=d.date.slice(5)+" "+d.weekday+" · "+d.total+" 条";
        a.href=d.file||("archive/ai-daily-"+d.date+".html"); a.target="_self";
        chips.appendChild(a);
      });
    }
    function loadHistory(){ return fetch("records/history.json").then(function(r){ if(!r.ok) throw 0; return r.json(); }); }
    function openHistory(){
      histbar.hidden=!histbar.hidden;
      if(histbar.hidden||chips.childElementCount) return;
      if(location.protocol==="https:"){
        loadHistory().then(buildChipsInline).catch(function(){ buildChipsLinks(HIST_INDEX); });
      } else {
        buildChipsLinks(HIST_INDEX);
      }
    }
    histToggle.addEventListener("click", openHistory);

    // refresh (best-effort): refetch latest daily; fallback through CORS proxies
    var btn=document.getElementById("refreshBtn");
    var toast=document.getElementById("toast");
    var toastT;
    function showToast(msg){toast.textContent=msg;toast.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){toast.classList.remove("show");},2600);}
    function tryFetch(url,opts){return fetch(url,opts);}
    btn.addEventListener("click",function(){
      btn.disabled=true;showToast("正在刷新…");
      var direct="https://aihot.virxact.com/api/public/daily";
      var proxies=[
        "https://api.allorigins.win/raw?url="+encodeURIComponent(direct),
        "https://corsproxy.io/?url="+encodeURIComponent(direct)
      ];
      var attempts=[direct].concat(proxies);
      (function next(i){
        if(i>=attempts.length){btn.disabled=false;showToast("刷新失败：浏览器网络/CORS 受限，已保留当前内容");return;}
        tryFetch(attempts[i],{headers:{"User-Agent":"Mozilla/5.0"}}).then(function(r){return r.ok?r.json():Promise.reject("http "+r.status);}).then(function(json){
          var ne={source:json,usedDate:json.date,isToday:false,fallback:true,fetchedAt:new Date().toISOString()};
          render(ne);TODAY_ENV=ne;hideBanner();btn.disabled=false;showToast("已更新至最新一期（"+json.date+"）");
        }).catch(function(e){next(i+1);});
      })(0);
    });
  })();
  </script>
